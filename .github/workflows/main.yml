on:
  push:
    branches: [main]
name: 🚀 Deploy website on push to production
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 21
        uses: actions/setup-node@v2
        with:
          node-version: "21"

      - name: Install Composer Dependencies
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Generate autoload files
        run: composer dump-autoload

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Install NPM Dependencies
        run: npm ci

      - name: Remove hot file
        run: rm -f public/hot

      - name: 📂 Sync files (lftp mirror)
        run: |
          sudo apt-get install -y -q lftp > /dev/null 2>&1
          lftp -c "
            set ftp:ssl-allow no;
            open ftp://${{ secrets.ftp_username }}:${{ secrets.ftp_password }}@vps83585.serveur-vps.net;
            cd /web;
            mirror --reverse --continue --dereference --verbose \
                   --exclude-glob=node_modules/ \
                   --exclude-glob=.git/ \
                   --exclude-glob=.github/ \
                   --exclude-glob=.htaccess \
                   --exclude-glob=app/Helpers/php/ \
                   --exclude-glob=storage/framework/cache/ \
                   --exclude-glob=storage/framework/sessions/ \
                   --exclude-glob=storage/framework/views/ \
                   --exclude-glob=storage/logs/ \
                   ./ ./;
            quit;
          "
