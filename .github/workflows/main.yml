on:
  push:
    branches: [main]
name: 🚀 Deploy website on push to production
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 21
        uses: actions/setup-node@v2
        with:
          node-version: "21"

      - name: Install Composer Dependencies
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Generate autoload files
        run: composer dump-autoload

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Link Storage
        run: php artisan storage:link

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Remove hot file
        run: rm -f public/hot

      - name: Configure FTP include
        run: |
          echo "!node_modules/" > .git-ftp-include

      - name: 🧹 Clean malicious .htaccess files on server
        run: |
          sudo apt-get install -y -q lftp > /dev/null 2>&1
          lftp -e "
          open ftp://${{ secrets.ftp_username }}:${{ secrets.ftp_password }}@vps83585.serveur-vps.net;
          cd /web;
          glob -a rm -f app/.htaccess;
          glob -a rm -f bootstrap/.htaccess;
          glob -a rm -f config/.htaccess;
          glob -a rm -f database/.htaccess;
          glob -a rm -f lang/.htaccess;
          glob -a rm -f resources/.htaccess;
          glob -a rm -f routes/.htaccess;
          glob -a rm -f storage/.htaccess;
          glob -a rm -f tests/.htaccess;
          glob -a rm -f vendor/.htaccess;
          glob -a rm -f node_modules/.htaccess;
          glob -a rm -f public/build/.htaccess;
          glob -a rm -f public/build/assets/.htaccess;
          glob -a rm -f public/storage/.htaccess;
          quit;
          " || true

      - name: 📤 Upload correct root .htaccess
        run: |
          lftp -e "
          open ftp://${{ secrets.ftp_username }}:${{ secrets.ftp_password }}@vps83585.serveur-vps.net;
          cd /web;
          put .htaccess;
          quit;
          " || echo "Warning: Could not upload root .htaccess"

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: vps83585.serveur-vps.net
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          server-dir: /web/
          exclude: |
            /app/Helpers/php
            .htaccess
