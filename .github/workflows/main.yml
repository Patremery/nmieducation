on:
  push:
    branches: [main]
name: 🚀 Deploy website on push to production
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 21
        uses: actions/setup-node@v2
        with:
          node-version: "21"

      - name: Install Composer Dependencies
        run: composer install --ignore-platform-reqs --no-scripts --no-interaction --prefer-dist

      - name: Generate autoload files
        run: composer dump-autoload

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Remove hot file
        run: rm -f public/hot

      - name: Create Unzip Script
        run: |
          cat << 'EOF' > public/unzip.php
          <?php
          $zipFile = __DIR__ . '/../deploy.zip';
          if (file_exists($zipFile) && class_exists('ZipArchive')) {
              $zip = new ZipArchive;
              if ($zip->open($zipFile) === TRUE) {
                  $zip->extractTo(__DIR__ . '/..');
                  $zip->close();
                  echo "Success";
                  @unlink($zipFile);
                  @unlink(__FILE__);
              } else {
                  echo "Failed to open zip";
                  http_response_code(500);
              }
          } else {
              echo "ZipArchive missing or file not found";
              http_response_code(500);
          }
          EOF

      - name: Zip Entire Application
        run: zip -rq deploy.zip . -x "*.git*" "*.github*" "node_modules/*" "tests/*" "storage/*" ".env" "deploy.zip" "public/.htaccess"

      - name: 📤 Upload Zip and Script via lftp
        run: |
          sudo apt-get install -y -q lftp > /dev/null 2>&1
          lftp -c "
            set ftp:ssl-allow no;
            open ftp://${{ secrets.ftp_username }}:${{ secrets.ftp_password }}@vps83585.serveur-vps.net;
            cd /web;
            put deploy.zip;
            cd public;
            put public/unzip.php -o unzip.php;
            mv .htaccess .htaccess.disabled;
            quit;
          "

      - name: 📦 Extract on Server
        run: |
          curl -s -f "https://nmieducation.com/unzip.php" || echo "Extraction might have failed or timed out. Check manually."
          curl -s -f "https://nmieducation.com/delete-folders.php" || echo "Deletion script timed out or failed."

      - name: 🔄 Restore .htaccess
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            open ftp://${{ secrets.ftp_username }}:${{ secrets.ftp_password }}@vps83585.serveur-vps.net;
            cd /web/public;
            mv .htaccess.disabled .htaccess;
            quit;
          "

